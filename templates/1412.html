{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Marks Management System</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background-image: url('{% static 'images/bg-home.jpg' %}');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            text-align: center;
            color: white;
        }

        input {
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px 20px;
            border: white;
            border-radius: 8px;
            background: #00c6ff;
            color: blue;
            cursor: pointer;
        }

        h1 {
            color:red;
        }
        h2{
            color:Blue
        }
    </style>
</head>

<body>

<div class="box">
    <a href="{% url 'view_students' %}">
    <button>View Students</button>
    </a>

     <form method="POST" action="{% url 'SRS' %}">

    {% csrf_token %}

    <input type="text" name="Name" placeholder="Student Name" value="{{ Name }}">

    <input type="number" name="marks1"
           placeholder="1st Subject"
           value="{{ m1 }}">

    <input type="number" name="marks2"
           placeholder="2nd Subject"
           value="{{ m2 }}">

    <input type="number" name="marks3"
           placeholder="3rd Subject"
           value="{{ m3 }}">

    <input type="number" name="marks4"
           placeholder="4th Subject"
           value="{{ m4 }}">

    <input type="submit" value="Submit">

</form>

{% if Error %}
    <h2>{{ Error }}</h2>
{% endif %} 
{% if Grade %}
    <h1>Hello {{ Name }}</h1>
    <h2>{{ Grade }}</h2>
    <h2>Total : {{ total }}</h2>
    <h2>Average : {{ total_avg }}</h2>
{% endif %}

</div>

</body>
</html>
