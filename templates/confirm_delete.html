<!DOCTYPE html>
<html>
<head>
    <title>Delete Student</title>
</head>
<body>

    <h2>Are you sure?</h2>

    <p>
        Do you want to delete
        <b>{{ student.Name }}</b> ?
    </p>

    <form method="POST">

        {% csrf_token %}

        <button type="submit">
            Yes Delete
        </button>

    </form>

    <br>

    <a href="{% url 'view_students' %}">
        Cancel
    </a>

</body>
</html>
